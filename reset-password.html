<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reset password — First Class Agency</title>
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0d0d0e" />
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/styles.css" />
<script src="assets/js/theme.js"></script>
</head>
<body>

<canvas id="gate-canvas" class="gate-canvas" aria-hidden="true"></canvas>

<header class="site-header">
  <a href="index.html" class="brand">
    <img class="brand-logo" src="assets/img/logo.png" alt="First Class Agency" />
    <span>First Class Agency</span>
  </a>
  <div class="nav-cta">
    <span class="btn btn--quiet" style="cursor:default;">Reset password</span>
  </div>
</header>

<main class="gate">
  <div class="gate-card reveal in">
    <div class="gate-intro">
      <span class="zap-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor" stroke="none"/>
        </svg>
        Secure reset link
      </span>
      <h1 id="reset-heading">Set a new password.</h1>
      <p class="gate-sub" id="reset-sub">Pick something at least 6 characters. Once saved you'll be signed in.</p>
    </div>

    <!-- Loading state while we verify the recovery token -->
    <div id="reset-loading" class="reset-loading">
      <p>Verifying your reset link…</p>
    </div>

    <!-- Set-new-password form (shown once token is valid) -->
    <form id="reset-form" class="form hidden" autocomplete="off">
      <div class="field">
        <label for="reset-password">New password</label>
        <input class="input" id="reset-password" name="password" type="password" required autocomplete="new-password" minlength="6" />
        <span class="help">Minimum 6 characters.</span>
      </div>
      <div class="field">
        <label for="reset-confirm">Confirm new password</label>
        <input class="input" id="reset-confirm" name="confirm" type="password" required autocomplete="new-password" minlength="6" />
      </div>
      <p id="reset-err" class="err"></p>
      <p id="reset-ok" class="ok"></p>
      <button id="reset-btn" class="btn btn--primary full-width btn--lg" type="submit">Save new password <span class="arrow">→</span></button>
    </form>

    <!-- Bad-link state -->
    <div id="reset-invalid" class="reset-invalid hidden">
      <p>This reset link is invalid or has already been used.</p>
      <a href="index.html" class="btn btn--primary full-width mt-12">Back to sign in</a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/gate-particles.js"></script>
<script>
(async () => {
  const SUPABASE_URL = 'https://bfctxiwllbiekfxkupjb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_VhnuqTPUZwTIMVeNxhP17Q_TxS54DsR';

  if (!window.supabase) {
    document.getElementById('reset-loading').textContent = 'Could not load auth library. Please refresh.';
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      autoRefreshToken: true,
      persistSession: true,
      detectSessionInUrl: true,
    },
  });

  const loading = document.getElementById('reset-loading');
  const form = document.getElementById('reset-form');
  const invalid = document.getElementById('reset-invalid');

  // Wait briefly for Supabase to parse the recovery token from the URL hash.
  // (detectSessionInUrl: true above handles this automatically.)
  let session = null;
  for (let i = 0; i < 10; i++) {
    const { data } = await sb.auth.getSession();
    if (data.session) { session = data.session; break; }
    await new Promise((r) => setTimeout(r, 150));
  }

  loading.classList.add('hidden');

  if (!session) {
    invalid.classList.remove('hidden');
    return;
  }

  form.classList.remove('hidden');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('reset-password').value;
    const confirm = document.getElementById('reset-confirm').value;
    const err = document.getElementById('reset-err');
    const ok = document.getElementById('reset-ok');
    const btn = document.getElementById('reset-btn');
    err.classList.remove('show'); err.textContent = '';
    ok.classList.remove('show'); ok.textContent = '';

    if (password.length < 6) {
      err.textContent = 'Password must be at least 6 characters.';
      err.classList.add('show');
      return;
    }
    if (password !== confirm) {
      err.textContent = "Passwords don't match.";
      err.classList.add('show');
      return;
    }

    btn.disabled = true;
    const original = btn.innerHTML;
    btn.textContent = 'Saving…';
    const { error } = await sb.auth.updateUser({ password });
    if (error) {
      err.textContent = error.message || 'Could not update password. Try again.';
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = original;
      return;
    }
    ok.textContent = 'Password updated. Taking you to your dashboard…';
    ok.classList.add('show');
    setTimeout(() => {
      window.location.href = 'agent/dashboard.html';
    }, 1200);
  });
})();
</script>
</body>
</html>
