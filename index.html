<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agent portal — First Class Agency</title>
<meta name="description" content="Agent portal for First Class Agency. Login required." />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0d0d0e" />
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/styles.css" />
<script src="assets/js/theme.js"></script>
</head>
<body>

<!-- particle network background -->
<canvas id="gate-canvas" class="gate-canvas" aria-hidden="true"></canvas>

<header class="site-header">
  <a href="index.html" class="brand">
    <img class="brand-logo" src="assets/img/logo.png" alt="First Class Agency" />
    <span>First Class Agency</span>
  </a>
  <div class="nav-cta">
    <span class="btn btn--quiet" style="cursor:default;">Agent portal</span>
  </div>
</header>

<main class="gate">
  <div class="gate-card reveal in">
    <div class="gate-intro">
      <span class="zap-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor" stroke="none"/>
        </svg>
        Secure agent access
      </span>
      <h1 id="gate-heading">Welcome back.</h1>
      <p class="gate-sub" id="gate-sub">Sign in with your agent account, or create one if you're new.</p>
    </div>

    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" data-tab="signin" type="button" role="tab">Sign in</button>
      <button class="auth-tab" data-tab="signup" type="button" role="tab">Create account</button>
    </div>

    <!-- SIGN IN -->
    <form id="signin-form" class="form" autocomplete="on">
      <div class="field">
        <label for="signin-email">Email</label>
        <input class="input" id="signin-email" name="email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="signin-password">Password</label>
        <input class="input" id="signin-password" name="password" type="password" required autocomplete="current-password" minlength="6" />
      </div>
      <p id="signin-err" class="err"></p>
      <button id="signin-btn" class="btn btn--primary full-width btn--lg" type="submit">Sign in <span class="arrow">→</span></button>
    </form>

    <!-- CREATE ACCOUNT -->
    <form id="signup-form" class="form hidden" autocomplete="on">
      <div class="field">
        <label for="signup-name">Full name</label>
        <input class="input" id="signup-name" name="fullName" type="text" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input class="input" id="signup-email" name="email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <input class="input" id="signup-password" name="password" type="password" required autocomplete="new-password" minlength="6" />
        <span class="help">Minimum 6 characters.</span>
      </div>
      <p id="signup-err" class="err"></p>
      <p id="signup-ok" class="ok"></p>
      <button id="signup-btn" class="btn btn--primary full-width btn--lg" type="submit">Create account <span class="arrow">→</span></button>
    </form>

    <p style="font-size:0.85rem;color:var(--text-3);text-align:center;">
      Trouble signing in? Email <a href="mailto:malikailee.ffl@gmail.com" style="color:var(--accent-bright);">malikailee.ffl@gmail.com</a>.
    </p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/gate-particles.js"></script>
<script src="assets/js/agent-auth.js"></script>
</body>
</html>
